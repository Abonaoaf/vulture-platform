<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر الشاملة 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #334155; --bg: #f1f5f9; --white: #ffffff; --text: #0f172a; --success: #059669; --num-color: #dc2626; --link-dark: #000080; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { padding: 20px; max-width: 700px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; border: 1px solid #e2e8f0; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { background: var(--success); color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .app-img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        .admin-controls { position: absolute; top: 10px; left: 10px; display: none; gap: 5px; }
        .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
        .info-row { display: flex; justify-content: space-between; margin-top: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .highlight-num { color: var(--num-color); font-weight: 900; }
        .highlight-link { color: var(--link-dark); font-weight: bold; font-size: 0.85rem; word-break: break-all; }
    </style>
</head>
<body>

<div id="loading" class="loading">جاري المزامنة مع السحابة...</div>

<div class="header">
    <h1>فولتشر السحابي 🚀</h1>
    <p>المتجر ومنصة العملاء في مكان واحد</p>
</div>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('apps')">تطبيقاتي</button>
        <button class="tab-btn" onclick="switchTab('clients')">عملائي</button>
    </div>

    <div id="apps-sec" class="section active">
        <div id="appAdmin" style="display:none;" class="card">
            <h3>إضافة / تعديل تطبيق</h3>
            <input type="hidden" id="appDocId">
            <input type="file" accept="image/*" onchange="const r=new FileReader(); r.onload=e=>window.appImgB64=e.target.result; r.readAsDataURL(this.files[0])">
            <input type="text" id="appName" placeholder="اسم التطبيق">
            <input type="text" id="appCode" placeholder="كود Downloader">
            <input type="text" id="appLink" placeholder="رابط التحميل">
            <textarea id="appDesc" placeholder="وصف التطبيق"></textarea>
            <button class="btn-main" onclick="saveApp()">حفظ التطبيق</button>
        </div>
        <div id="appsList"></div>
    </div>

    <div id="clients-sec" class="section">
        <div id="clientAdmin" style="display:none;" class="card">
            <h3>إضافة / تعديل عميل</h3>
            <input type="hidden" id="clientDocId">
            <input type="text" id="cName" placeholder="اسم العميل">
            <input type="text" id="cPhone" placeholder="رقم الجوال">
            <input type="text" id="cExpiry" placeholder="تاريخ الانتهاء (يوم/شهر/سنة)">
            <input type="text" id="cPlan" placeholder="نوع الاشتراك">
            <button class="btn-main" onclick="saveClient()" style="background:#007bff">حفظ العميل</button>
        </div>
        <div id="clientsList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // بيانات سحابتك مباشرة
    const firebaseConfig = { projectId: "vulture-app-1efba" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const isAdmin = new URLSearchParams(location.search).get('admin') === '123';
    if(isAdmin) {
        document.getElementById('appAdmin').style.display = 'block';
        document.getElementById('clientAdmin').style.display = 'block';
    }

    // إدارة التبويبات
    window.switchTab = (t) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t+'-sec').classList.add('active');
        event.target.classList.add('active');
    }

    // مزامنة التطبيقات
    onSnapshot(collection(db, "apps"), (s) => {
        const list = document.getElementById('appsList'); list.innerHTML = "";
        s.forEach((d) => {
            const item = d.data(); const id = d.id;
            list.innerHTML += `<div class="card">
                <div class="admin-controls" style="${isAdmin?'display:flex':'none'}">
                    <button onclick="editApp('${id}',${JSON.stringify(item).replace(/"/g,'&quot;')})">📝</button>
                    <button onclick="deleteDoc(doc(db,'apps','${id}'))">🗑️</button>
                </div>
                <img src="${item.img}" class="app-img">
                <h4>${item.name}</h4>
                <div class="info-row"><span>كود:</span> <span class="highlight-num">${item.code}</span></div>
                <div class="info-row"><span class="highlight-link">${item.link}</span></div>
                <button class="btn-main" onclick="window.open('${item.link}')">تحميل</button>
            </div>`;
        });
    });

    // مزامنة العملاء
    onSnapshot(collection(db, "clients"), (s) => {
        const list = document.getElementById('clientsList'); list.innerHTML = "";
        s.forEach((d) => {
            const c = d.data(); const id = d.id;
            list.innerHTML += `<div class="card">
                <div class="admin-controls" style="${isAdmin?'display:flex':'none'}">
                    <button onclick="editClient('${id}',${JSON.stringify(c).replace(/"/g,'&quot;')})">📝</button>
                    <button onclick="deleteDoc(doc(db,'clients','${id}'))">🗑️</button>
                </div>
                <strong>👤 ${c.name}</strong>
                <div class="info-row"><span>الجوال:</span> <span>${c.phone}</span></div>
                <div class="info-row"><span>الاشتراك:</span> <span>${c.plan}</span></div>
                <div class="info-row"><span>ينتهي في:</span> <span style="color:red; font-weight:bold;">${c.expiry}</span></div>
            </div>`;
        });
    });

    // وظائف الحفظ
    window.saveApp = async () => {
        const id = document.getElementById('appDocId').value;
        const data = { name: document.getElementById('appName').value, code: document.getElementById('appCode').value, link: document.getElementById('appLink').value, desc: document.getElementById('appDesc').value };
        if(window.appImgB64) data.img = window.appImgB64;
        document.getElementById('loading').style.display='flex';
        id ? await updateDoc(doc(db,"apps",id), data) : await addDoc(collection(db,"apps"), data);
        location.reload();
    };

    window.saveClient = async () => {
        const id = document.getElementById('clientDocId').value;
        const data = { name: document.getElementById('cName').value, phone: document.getElementById('cPhone').value, expiry: document.getElementById('cExpiry').value, plan: document.getElementById('cPlan').value };
        document.getElementById('loading').style.display='flex';
        id ? await updateDoc(doc(db,"clients",id), data) : await addDoc(collection(db,"clients"), data);
        location.reload();
    };

    window.editApp = (id, data) => {
        document.getElementById('appDocId').value = id;
        document.getElementById('appName').value = data.name;
        document.getElementById('appCode').value = data.code;
        document.getElementById('appLink').value = data.link;
        document.getElementById('appDesc').value = data.desc;
        window.scrollTo(0,0);
    };

    window.editClient = (id, data) => {
        document.getElementById('clientDocId').value = id;
        document.getElementById('cName').value = data.name;
        document.getElementById('cPhone').value = data.phone;
        document.getElementById('cExpiry').value = data.expiry;
        document.getElementById('cPlan').value = data.plan;
        window.scrollTo(0,0);
    };

    window.db = db; // للوصول للحذف من الـ HTML
</script>
</body>
</html>
