<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر الاحترافية 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        
        /* شريط المدة المتناقص */
        .progress-container { background: #eee; height: 12px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 100%; background: linear-gradient(to left, var(--success), #ffeb3b, var(--danger)); transition: width 0.5s; width: 100%; }
        
        /* العد التنازلي التفصيلي */
        .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin: 15px 0; }
        .count-item { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .count-num { display: block; font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .count-label { font-size: 0.7rem; color: #666; }

        /* حقول العميل مع أزرار النسخ */
        .info-field { background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #efefef; }
        .copy-btn { background: #eef2ff; border: none; color: var(--primary); padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        /* التبويبات */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* لوحة الإدارة */
        #adminPanel { display: none; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .app-card { display: flex; align-items: center; gap: 15px; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .app-img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div id="adminPanel">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('c')">إضافة عميل</button>
            <button class="tab-btn" onclick="switchTab('a')">إضافة تطبيق</button>
        </div>

        <div id="sec-c" class="card">
            <input type="text" id="cName" placeholder="اسم العميل">
            <input type="text" id="cPhone" placeholder="رقم الجوال">
            <input type="text" id="cUser" placeholder="اسم المستخدم">
            <input type="text" id="cPass" placeholder="الرقم السري">
            <input type="text" id="cLink" placeholder="رابط الاشتراك">
            <input type="date" id="cStart" placeholder="بداية الاشتراك">
            <input type="date" id="cExpiry" placeholder="نهاية الاشتراك">
            <button class="btn-save" onclick="saveData('clients')">حفظ العميل في السحابة</button>
        </div>

        <div id="sec-a" class="card" style="display:none;">
            <input type="file" accept="image/*" onchange="encodeImg(this)">
            <input type="text" id="aName" placeholder="اسم التطبيق">
            <input type="text" id="aCode" placeholder="كود دونلودر">
            <input type="text" id="aLink" placeholder="رابط التطبيق">
            <textarea id="aDesc" placeholder="وصف التطبيق"></textarea>
            <button class="btn-save" onclick="saveData('apps')" style="background:var(--primary)">حفظ في المتجر</button>
        </div>
    </div>

    <div id="displayArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { projectId: "vulture-app-1efba" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(location.search);
    const isAdmin = params.get('admin') === '123';
    const userTarget = params.get('user');

    if(isAdmin) document.getElementById('adminPanel').style.display = 'block';

    // جلب بيانات العميل والعد التنازلي
    if(userTarget) {
        onSnapshot(query(collection(db, "clients"), where("name", "==", userTarget)), (s) => {
            const area = document.getElementById('displayArea');
            s.forEach(d => {
                const c = d.data();
                area.innerHTML = `
                <div class="card">
                    <h2 style="text-align:center;">مرحباً ${c.name} 👋</h2>
                    <div class="progress-container"><div id="pBar" class="progress-bar"></div></div>
                    <div class="countdown" id="timer"></div>
                    
                    <div class="info-field"><span>👤 المستخدم: <b id="u">${c.user}</b></span><button class="copy-btn" onclick="copy('u')">نسخ</button></div>
                    <div class="info-field"><span>🔑 السر: <b id="p">${c.pass}</b></span><button class="copy-btn" onclick="copy('p')">نسخ</button></div>
                    <div class="info-field"><span>🔗 الرابط: <b id="l" style="font-size:0.7rem;">${c.link}</b></span><button class="copy-btn" onclick="copy('l')">نسخ</button></div>
                    <div class="info-field"><span>📅 ينتهي في: <b>${c.expiry}</b></span></div>
                </div>`;
                startTimer(c.start, c.expiry);
            });
        });
    } else {
        // عرض المتجر
        onSnapshot(collection(db, "apps"), (s) => {
            const area = document.getElementById('displayArea');
            if(!userTarget) area.innerHTML = "<h3>متجر التطبيقات 🚀</h3>";
            s.forEach(d => {
                const a = d.data();
                area.innerHTML += `
                <div class="card app-card">
                    <img src="${a.img}" class="app-img">
                    <div style="flex:1">
                        <b>${a.name}</b><br>
                        <small id="c_${d.id}">كود: ${a.code}</small>
                    </div>
                    <button class="copy-btn" onclick="copy('c_${d.id}')">نسخ الكود</button>
                    <a href="${a.link}" class="copy-btn" style="background:var(--success); color:white; text-decoration:none;">تحميل</a>
                </div>`;
            });
        });
    }

    // نظام العد التنازلي والشريط
    function startTimer(start, end) {
        setInterval(() => {
            const now = new Date().getTime();
            const sTime = new Date(start).getTime();
            const eTime = new Date(end).getTime();
            
            const total = eTime - sTime;
            const remaining = eTime - now;
            
            const pct = (remaining / total) * 100;
            document.getElementById('pBar').style.width = pct + "%";
            if(pct < 20) document.getElementById('pBar').style.background = 'red';

            const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((remaining % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = `
                <div class="count-item"><span class="count-num">${days}</span><span class="count-label">يوم</span></div>
                <div class="count-item"><span class="count-num">${hours}</span><span class="count-label">ساعة</span></div>
                <div class="count-item"><span class="count-num">${mins}</span><span class="count-label">دقيقة</span></div>
                <div class="count-item"><span class="count-num">${secs}</span><span class="count-label">ثانية</span></div>
            `;
        }, 1000);
    }

    window.saveData = async (type) => {
        const data = type === 'clients' ? {
            name: document.getElementById('cName').value,
            phone: document.getElementById('cPhone').value,
            user: document.getElementById('cUser').value,
            pass: document.getElementById('cPass').value,
            link: document.getElementById('cLink').value,
            start: document.getElementById('cStart').value,
            expiry: document.getElementById('cExpiry').value
        } : {
            name: document.getElementById('aName').value,
            code: document.getElementById('aCode').value,
            link: document.getElementById('aLink').value,
            desc: document.getElementById('aDesc').value,
            img: window.tmpImg
        };
        await addDoc(collection(db, type), data);
        alert("تم الحفظ بنجاح ✅");
    };

    window.copy = (id) => {
        const txt = document.getElementById(id).innerText;
        navigator.clipboard.writeText(txt);
        alert("تم النسخ ✅");
    };

    window.switchTab = (t) => {
        document.getElementById('sec-c').style.display = t === 'c' ? 'block' : 'none';
        document.getElementById('sec-a').style.display = t === 'a' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active'));
    };

    window.encodeImg = (el) => {
        const r = new FileReader();
        r.onload = e => window.tmpImg = e.target.result;
        r.readAsDataURL(el.files[0]);
    };
</script>
</body>
</html>
